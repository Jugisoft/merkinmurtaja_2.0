<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Merkinmurtaja</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--accent:#4f8ef7;--accent2:#f7a34f;
  --success:#4fcf7a;--danger:#f75757;--warning:#f7e14f;--muted:#7c8099;--text:#e8eaf0;--border:#2a2e45}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:40px}
.view{display:none}.view.active{display:block}
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.topbar-title{font-weight:800;font-size:1rem;color:var(--accent)}
.topbar-sub{font-size:.8rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.content{padding:12px}
.card{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-weight:700;color:var(--accent2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em;font-size:.8rem}
label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input[type=text],input[type=password],select,textarea{width:100%;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.95rem;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical}
select option{background:var(--surface2)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 14px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface2);color:var(--text);
  font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#0f1117}
.btn-success{background:var(--success);border-color:var(--success);color:#0f1117}
.btn-danger{background:rgba(247,87,87,.15);border-color:var(--danger);color:var(--danger)}
.btn-warning{background:rgba(247,227,79,.1);border-color:var(--warning);color:var(--warning)}
.btn-ghost{background:transparent;border-color:var(--border)}
.btn-full{width:100%}
.btn-lg{padding:14px;font-size:1rem}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:700;white-space:nowrap}
.badge-meni{background:rgba(79,207,122,.2);color:var(--success)}
.badge-pois{background:rgba(247,87,87,.2);color:var(--danger)}
.badge-muted{background:rgba(124,128,153,.2);color:var(--muted)}
.muted{color:var(--muted)}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.iso-btn{width:100%;padding:22px;border-radius:12px;border:3px solid var(--border);
  font-size:1.3rem;font-weight:800;cursor:pointer;transition:all .15s;text-align:center;background:transparent}
.iso-btn-meni{color:var(--success)}
.iso-btn-meni.valittu{background:var(--success);color:#0f1117;border-color:var(--success)}
.iso-btn-ei{color:var(--danger)}
.iso-btn-ei.valittu{background:var(--danger);color:#fff;border-color:var(--danger)}
.flash{padding:10px 14px;border-radius:8px;margin-top:10px;font-size:.9rem;font-weight:600}
.flash-ok{background:rgba(79,207,122,.15);color:var(--success);border:1px solid var(--success)}
.flash-err{background:rgba(247,87,87,.15);color:var(--danger);border:1px solid var(--danger)}
/* Havainto-rivi */
.havainto-rivi{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.havainto-rivi:last-child{border-bottom:none}
.havainto-teksti{flex:1;font-size:.88rem;line-height:1.4;color:var(--text)}
.havainto-muokkaa{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:.75rem;cursor:pointer;white-space:nowrap}
.havainto-muokkaa:hover{border-color:var(--accent);color:var(--accent)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-title{font-weight:800;font-size:1rem;margin-bottom:16px;color:var(--accent)}
/* Analyysi */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:7px 8px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:.75rem;text-transform:uppercase}
.bar-wrap{width:80px;background:var(--surface2);border-radius:4px;height:10px;overflow:hidden}
.bar{height:100%;border-radius:4px}
.stat-box{text-align:center;padding:14px;background:var(--surface2);border-radius:10px}
.stat-num{font-size:1.8rem;font-weight:800}
.stat-lbl{font-size:.75rem;color:var(--muted);margin-top:2px}
.spinner{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>

<!-- ══ KIRJAUDU ══════════════════════════════════════════════════ -->
<div id="view-kirjaudu" class="view active">
  <div style="text-align:center;padding:60px 24px 24px">
    <div style="font-size:3rem">🏟</div>
    <h1 style="font-size:1.5rem;font-weight:800;color:var(--accent);margin-top:8px">Merkinmurtaja</h1>
    <p class="muted" style="margin-top:4px">Selvitä vastustajan merkkikieli</p>
  </div>
  <div class="content">
    <div class="card">
      <div id="kirjaudu-flash"></div>
      <label>Nimesi</label>
      <input type="text" id="k-nimi" placeholder="esim. Pekka" autocomplete="given-name">
      <div id="koodi-rivi" style="display:none">
        <label>Tiimiläisten koodi</label>
        <input type="password" id="k-koodi" placeholder="••••••">
      </div>
      <button class="btn btn-primary btn-full btn-lg" style="margin-top:16px" onclick="kirjauduSisaan()">Kirjaudu →</button>
    </div>
  </div>
</div>

<!-- ══ ETUSIVU ════════════════════════════════════════════════════ -->
<div id="view-etusivu" class="view">
  <div class="topbar">
    <span class="topbar-title">🏟 Merkinmurtaja</span>
    <div style="display:flex;gap:6px;align-items:center">
      <span id="topbar-kayttaja" class="muted" style="font-size:.8rem"></span>
      <button class="btn btn-ghost" style="padding:4px 8px;font-size:.75rem" onclick="kirjauduUlos()">✕</button>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-title">➕ Uusi analysoitava ottelu</div>
      <label>Vastustaja</label>
      <input type="text" id="uusi-vastustaja" placeholder="esim. Sotkamon Jymy">
      <label>Päivämäärä</label>
      <input type="text" id="uusi-pvm">
      <label>Sarja</label>
      <select id="uusi-sarja">
        <option value="">— valitse —</option>
        <option>MSU</option><option>Talvisuper</option><option>Divari</option><option>Harjoitusottelu</option>
      </select>
      <button class="btn btn-primary btn-full btn-lg" style="margin-top:12px" onclick="luoOttelu()">Aloita kirjaus</button>
    </div>
    <div id="ottelut-lista"></div>
  </div>
</div>

<!-- ══ SYÖTTÖ ═════════════════════════════════════════════════════ -->
<div id="view-syotto" class="view">
  <div class="topbar">
    <div style="overflow:hidden">
      <div class="topbar-title" id="syotto-otsikko">Ottelu</div>
      <div class="topbar-sub" id="syotto-sub"></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-warning" style="padding:8px 14px;font-size:.85rem;font-weight:700" onclick="naytaAnalyysi()">📊 Analyysi</button>
      <button class="btn btn-ghost" style="padding:6px 10px;font-size:.75rem" onclick="naytaEtusivu()">← Koti</button>
    </div>
  </div>
  <div class="content">

    <!-- Syöttökortti -->
    <div class="card">
      <div class="card-title">Lähteekö etenijä?</div>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button class="iso-btn iso-btn-meni" id="btn-meni" onclick="valitseMeni('meni')">✅ MENI</button>
        <button class="iso-btn iso-btn-ei"   id="btn-ei"   onclick="valitseMeni('pois')">❌ EI MENNYT</button>
      </div>
      <label>Mitä näit? <span class="muted" style="font-weight:400">(vapaa kuvaus)</span></label>
      <textarea id="kuvaus-input" rows="3"
        placeholder="esim. viuhka menopesän puolella ylhäällä, peukalo kentälle päin, vapaa käsi rinnan edessä"></textarea>
      <button class="btn btn-success btn-full btn-lg" style="margin-top:12px" onclick="tallennaHavainto()">
        ✅ Tallenna havainto
      </button>
      <div id="tallenna-flash"></div>
    </div>

    <!-- Tallennetut havainnot -->
    <div class="card" id="havainnot-card" style="display:none">
      <div class="card-title" id="havainnot-otsikko">Tallennetut havainnot</div>
      <div id="havainnot-lista"></div>
    </div>

  </div>
</div>

<!-- ══ ANALYYSI ═══════════════════════════════════════════════════ -->
<div id="view-analyysi" class="view">
  <div class="topbar">
    <div style="overflow:hidden">
      <div class="topbar-title">📊 Analyysi</div>
      <div class="topbar-sub" id="analyysi-sub"></div>
    </div>
    <button class="btn btn-ghost" style="padding:6px 10px;font-size:.75rem" id="analyysi-back" onclick="naytaSyotto()">← Takaisin</button>
  </div>
  <div class="content" id="analyysi-content"><div class="spinner">Ladataan...</div></div>
</div>

<!-- ══ MUOKKAUSMODAALI ════════════════════════════════════════════ -->
<div class="modal-bg hidden" id="modal-bg" onclick="suljeModal(event)">
  <div class="modal">
    <div class="modal-title">Muokkaa havaintoa</div>
    <input type="hidden" id="modal-id">
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="iso-btn iso-btn-meni" id="modal-btn-meni" onclick="modalValitseMeni('meni')" style="padding:14px;font-size:1rem">✅ MENI</button>
      <button class="iso-btn iso-btn-ei"   id="modal-btn-ei"   onclick="modalValitseMeni('pois')" style="padding:14px;font-size:1rem">❌ EI MENNYT</button>
    </div>
    <label>Kuvaus</label>
    <textarea id="modal-kuvaus" rows="4"></textarea>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-success btn-full" onclick="tallennaModal()">Tallenna muutos</button>
      <button class="btn btn-danger" onclick="poistaModal()">🗑 Poista</button>
    </div>
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="suljeModal()">Peruuta</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAsepdakF6YRi7EQw8kGSiJXcsOcZhbcoA",
  authDomain:        "merkinmurtaja-487ab.firebaseapp.com",
  databaseURL:       "https://merkinmurtaja-487ab-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "merkinmurtaja-487ab",
  storageBucket:     "merkinmurtaja-487ab.firebasestorage.app",
  messagingSenderId: "395883899531",
  appId:             "1:395883899531:web:784e0721393423441cc28e"
};
const TIIMI_KOODI = "";

// ══════════════════════════════════════════════════════════════════
// VAKIOT
// ══════════════════════════════════════════════════════════════════
const MENI_TULOKSET = new Set(['meni','lento','sikalento','vaarat_pois','nopea_vaara','iso_vaara']);

// ══════════════════════════════════════════════════════════════════
// TILA
// ══════════════════════════════════════════════════════════════════
let db;
let kayttaja = localStorage.getItem('mm_kayttaja') || '';
let currentOtteluId = null;
let havainnot = [];
let havantoRef = null;
let havantoListener = null;
let tulostila = 'epasela';
let modalTulos = 'epasela';

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
  } catch(e) {
    document.body.innerHTML = '<div style="padding:40px;color:#f75757;font-family:sans-serif;max-width:480px;margin:0 auto">'
      + '<h2>Firebase-virhe</h2><p style="margin-top:12px">'+esc(e.message)+'</p></div>';
    return;
  }
  document.getElementById('uusi-pvm').value = tanaanPvm();
  if (TIIMI_KOODI) document.getElementById('koodi-rivi').style.display = '';
  document.getElementById('k-nimi').addEventListener('keydown', ev => { if(ev.key==='Enter') kirjauduSisaan(); });
  kayttaja ? naytaEtusivu() : nayta('kirjaudu');
});

// ══════════════════════════════════════════════════════════════════
// NÄKYMÄT
// ══════════════════════════════════════════════════════════════════
function nayta(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  window.scrollTo(0,0);
}
function naytaEtusivu() {
  nayta('etusivu');
  document.getElementById('topbar-kayttaja').textContent = kayttaja;
  lataaOttelut();
}
function naytaSyotto() { nayta('syotto'); }
function naytaAnalyysi() {
  document.getElementById('analyysi-sub').textContent = document.getElementById('syotto-otsikko').textContent;
  document.getElementById('analyysi-back').onclick = naytaSyotto;
  nayta('analyysi');
  renderAnalyysi();
}

// ══════════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════════
function kirjauduSisaan() {
  const nimi = document.getElementById('k-nimi').value.trim();
  const koodi = document.getElementById('k-koodi').value.trim();
  if (!nimi) { flash('kirjaudu-flash','Anna nimesi.',true); return; }
  if (TIIMI_KOODI && koodi !== TIIMI_KOODI) { flash('kirjaudu-flash','Väärä tiimiläisten koodi.',true); return; }
  kayttaja = nimi;
  localStorage.setItem('mm_kayttaja', nimi);
  naytaEtusivu();
}
function kirjauduUlos() {
  irrota();
  localStorage.removeItem('mm_kayttaja');
  kayttaja = '';
  nayta('kirjaudu');
}
function irrota() {
  if (havantoRef && havantoListener) {
    havantoRef.off('value', havantoListener);
  }
  havantoRef = null;
  havantoListener = null;
}

// ══════════════════════════════════════════════════════════════════
// OTTELUT
// ══════════════════════════════════════════════════════════════════
function luoOttelu() {
  const vastustaja = document.getElementById('uusi-vastustaja').value.trim();
  const pvm = document.getElementById('uusi-pvm').value.trim() || tanaanPvm();
  const sarja = document.getElementById('uusi-sarja').value;
  const nimi = vastustaja ? vastustaja+' '+pvm : 'Ottelu '+pvm;
  const id = nimi.replace(/\s+/g,'_').replace(/[/.]/g,'')+'_'+Date.now();
  db.ref('ottelut/'+id).set({nimi, vastustaja, sarja, luotu: new Date().toISOString()});
  avaaOttelu(id, nimi);
}

function avaaOttelu(id, nimi) {
  irrota();
  currentOtteluId = id;
  havainnot = [];
  tulostila = 'epasela';
  document.getElementById('syotto-otsikko').textContent = nimi;
  document.getElementById('syotto-sub').textContent = 'Ladataan...';
  document.getElementById('btn-meni').classList.remove('valittu');
  document.getElementById('btn-ei').classList.remove('valittu');
  document.getElementById('kuvaus-input').value = '';
  nayta('syotto');
  havantoRef = db.ref('havainnot/'+id);
  havantoListener = havantoRef.on('value', snap => {
    havainnot = [];
    snap.forEach(c => {
      const v = c.val();
      if (v) havainnot.push({id: c.key, ...v});
    });
    renderHavainnot();
    document.getElementById('syotto-sub').textContent = havainnot.length + ' havaintoa';
  });
}

function lataaOttelut() {
  const lista = document.getElementById('ottelut-lista');
  lista.innerHTML = '<div class="spinner">Ladataan...</div>';
  db.ref('ottelut').orderByChild('luotu').once('value', snap => {
    const ot = [];
    snap.forEach(c => ot.unshift({id:c.key,...c.val()}));
    if (!ot.length) {
      lista.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:32px">Ei vielä otteluita.</div>';
      return;
    }
    lista.innerHTML = '<div class="card"><div class="card-title">📋 Aiemmat ottelut</div>'
      + ot.map(o => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:600">${esc(o.nimi)}</div>
            <div class="muted" style="font-size:.8rem">${[o.vastustaja,o.sarja].filter(Boolean).join(' · ')}</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost" style="padding:5px 10px;font-size:.75rem"
              onclick="avaaOttelu('${o.id}','${esc(o.nimi)}')">✏️ Syötä</button>
            <button class="btn btn-warning" style="padding:5px 10px;font-size:.75rem"
              onclick="avaaAnalyysiSuoraan('${o.id}','${esc(o.nimi)}')">📊 Analysoi</button>
          </div>
        </div>`).join('')
      + (ot.length > 1 ? `<div style="margin-top:12px">
          <button class="btn btn-full" style="border-color:var(--accent);color:var(--accent)"
            onclick="avaaAnalyysiKaikki()">🔍 Analysoi kaikki ottelut yhdistettynä</button></div>` : '')
      + '</div>';
  });
}

function avaaAnalyysiSuoraan(id, nimi) {
  irrota();
  currentOtteluId = id;
  document.getElementById('analyysi-sub').textContent = nimi;
  document.getElementById('analyysi-back').onclick = naytaEtusivu;
  nayta('analyysi');
  document.getElementById('analyysi-content').innerHTML = '<div class="spinner">Ladataan...</div>';
  db.ref('havainnot/'+id).orderByKey().once('value', snap => {
    havainnot = [];
    snap.forEach(c => havainnot.push({id:c.key,...c.val()}));
    renderAnalyysi();
  });
}

function avaaAnalyysiKaikki() {
  irrota();
  currentOtteluId = null;
  document.getElementById('analyysi-sub').textContent = 'Kaikki ottelut';
  document.getElementById('analyysi-back').onclick = naytaEtusivu;
  nayta('analyysi');
  document.getElementById('analyysi-content').innerHTML = '<div class="spinner">Ladataan...</div>';
  db.ref('havainnot').once('value', snap => {
    havainnot = [];
    snap.forEach(ottelu => ottelu.forEach(c => havainnot.push({id:c.key,...c.val()})));
    renderAnalyysi();
  });
}

// ══════════════════════════════════════════════════════════════════
// HAVAINNOT: TALLENNUS
// ══════════════════════════════════════════════════════════════════
function valitseMeni(val) {
  tulostila = val;
  document.getElementById('btn-meni').classList.toggle('valittu', val !== 'pois');
  document.getElementById('btn-ei').classList.toggle('valittu', val === 'pois');
}

function tallennaHavainto() {
  if (!currentOtteluId) return;
  if (tulostila === 'epasela') {
    flash('tallenna-flash', 'Valitse ensin MENI tai EI MENNYT.', true);
    return;
  }
  db.ref('havainnot/'+currentOtteluId).push({
    tulos: tulostila,
    kuvaus: document.getElementById('kuvaus-input').value.trim(),
    luotu: new Date().toISOString(),
    kirjaaja: kayttaja,
  }).then(() => {
    tulostila = 'epasela';
    document.getElementById('btn-meni').classList.remove('valittu');
    document.getElementById('btn-ei').classList.remove('valittu');
    document.getElementById('kuvaus-input').value = '';
    flash('tallenna-flash', '✅ Tallennettu!', false);
  });
}

// ══════════════════════════════════════════════════════════════════
// HAVAINNOT: LISTAUS
// ══════════════════════════════════════════════════════════════════
function renderHavainnot() {
  const card = document.getElementById('havainnot-card');
  const lista = document.getElementById('havainnot-lista');
  if (!havainnot.length) { card.style.display = 'none'; return; }
  card.style.display = '';
  document.getElementById('havainnot-otsikko').textContent =
    'Tallennetut havainnot (' + havainnot.length + ')';

  lista.innerHTML = [...havainnot].reverse().map(h => {
    const meni = MENI_TULOKSET.has(h.tulos);
    const tuntematon = !meni && h.tulos !== 'pois';
    const cls = meni ? 'badge-meni' : tuntematon ? 'badge-muted' : 'badge-pois';
    const label = meni ? '✅ meni' : tuntematon ? '❓' : '❌ ei';
    const teksti = h.kuvaus || '<span class="muted">Ei kuvausta</span>';
    return `<div class="havainto-rivi">
      <span class="badge ${cls}" style="margin-top:2px">${label}</span>
      <span class="havainto-teksti">${h.kuvaus ? esc(h.kuvaus) : '<span class=\'muted\'>Ei kuvausta</span>'}</span>
      <button class="havainto-muokkaa" onclick="avaaModal('${h.id}')">muokkaa</button>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════════
// MUOKKAUSMODAALI
// ══════════════════════════════════════════════════════════════════
function avaaModal(havaintoId) {
  const h = havainnot.find(x => x.id === havaintoId);
  if (!h) return;
  modalTulos = h.tulos;
  document.getElementById('modal-id').value = havaintoId;
  document.getElementById('modal-kuvaus').value = h.kuvaus || '';
  document.getElementById('modal-btn-meni').classList.toggle('valittu', MENI_TULOKSET.has(h.tulos));
  document.getElementById('modal-btn-ei').classList.toggle('valittu', h.tulos === 'pois');
  document.getElementById('modal-bg').classList.remove('hidden');
}

function suljeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg')) return;
  document.getElementById('modal-bg').classList.add('hidden');
}

function modalValitseMeni(val) {
  modalTulos = val;
  document.getElementById('modal-btn-meni').classList.toggle('valittu', val !== 'pois');
  document.getElementById('modal-btn-ei').classList.toggle('valittu', val === 'pois');
}

function tallennaModal() {
  const id = document.getElementById('modal-id').value;
  if (!id || !currentOtteluId) return;
  db.ref('havainnot/'+currentOtteluId+'/'+id).update({
    tulos: modalTulos,
    kuvaus: document.getElementById('modal-kuvaus').value.trim(),
  }).then(() => { document.getElementById('modal-bg').classList.add('hidden'); });
}

function poistaModal() {
  const id = document.getElementById('modal-id').value;
  if (!id || !currentOtteluId) return;
  if (!confirm('Poistetaanko tämä havainto?')) return;
  db.ref('havainnot/'+currentOtteluId+'/'+id).remove()
    .then(() => { document.getElementById('modal-bg').classList.add('hidden'); });
}

// ══════════════════════════════════════════════════════════════════
// ANALYYSI
// ══════════════════════════════════════════════════════════════════
function kopioimAAnalyysiin() {
  const meniH = havainnot.filter(h => MENI_TULOKSET.has(h.tulos) && h.kuvaus);
  const poisH = havainnot.filter(h => h.tulos === 'pois' && h.kuvaus);

  if (meniH.length + poisH.length < 2) {
    alert('Lisää ensin kuvauksia havaintoihin ennen analyysiä.');
    return;
  }

  const meniRivit = meniH.map((h,i) => `${i+1}. ${h.kuvaus}`).join('\n');
  const poisRivit = poisH.map((h,i) => `${i+1}. ${h.kuvaus}`).join('\n');

  const prompt = `Olet pesäpallon merkkikielen analysoija. Alla on havaintoja ottelusta, joissa etenijä joko lähti pesältä (MENI) tai ei lähtenyt (EI MENNYT). Jokainen havainto on analysoijan vapaa kuvaus siitä mitä pelinjohtaja teki — viuhkan asento, käden asento, sijainti jne.

Tehtäväsi: selvitä mikä on vastustajan lähtemismerkki. Etsi toistuvia piirteitä MENI-ryhmässä jotka puuttuvat EI MENNYT -ryhmästä tai päinvastoin. Huomioi myös yhdistelmät (esim. viuhkan asento + käden asento yhdessä).

=== MENI — etenijä lähti (${meniH.length} havaintoa) ===
${meniRivit || '(ei kuvauksia)'}

=== EI MENNYT — etenijä ei lähtenyt (${poisH.length} havaintoa) ===
${poisRivit || '(ei kuvauksia)'}

Vastaa suomeksi. Anna selkeä analyysi: mikä näyttää olevan lähtemismerkki, mitkä piirteet erottavat ryhmät toisistaan, ja kuinka varma olet johtopäätöksestä?`;

  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.getElementById('kopioi-btn');
    btn.textContent = '✅ Kopioitu! Liitä claude.ai-chattiin';
    btn.style.background = 'rgba(79,207,122,.15)';
    btn.style.borderColor = 'var(--success)';
    btn.style.color = 'var(--success)';
    setTimeout(() => {
      btn.textContent = '🤖 Kopioi Claude AI -analyysiin';
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 4000);
  }).catch(() => {
    // Fallback jos clipboard ei toimi
    prompt_fallback(prompt);
  });
}

function prompt_fallback(teksti) {
  const ta = document.createElement('textarea');
  ta.value = teksti;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  const btn = document.getElementById('kopioi-btn');
  btn.textContent = '✅ Kopioitu!';
  setTimeout(() => { btn.textContent = '🤖 Kopioi Claude AI -analyysiin'; }, 3000);
}

function renderAnalyysi() {
  const el = document.getElementById('analyysi-content');
  if (!havainnot.length) {
    el.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:32px">Ei havaintoja analysoitavaksi.</div>';
    return;
  }

  const meniH = havainnot.filter(h => MENI_TULOKSET.has(h.tulos));
  const poisH = havainnot.filter(h => h.tulos === 'pois');
  const total  = havainnot.length;
  const teksti = tekstianalyysi(havainnot);

  el.innerHTML = `
    <!-- AI-analyysi nappi -->
    <div class="card" style="text-align:center;padding:20px">
      <div style="font-size:1.5rem;margin-bottom:8px">🤖</div>
      <p style="font-size:.9rem;margin-bottom:14px;color:var(--text)">
        Kopioi havainnot valmiina kysymyksenä Claude AI:lle.<br>
        <span class="muted" style="font-size:.82rem">Liitä teksti claude.ai-chattiin → saat tulkinnan.</span>
      </p>
      <button id="kopioi-btn" class="btn btn-full" style="font-size:1rem;padding:14px;border-color:var(--accent);color:var(--accent)"
        onclick="kopioimAAnalyysiin()">🤖 Kopioi Claude AI -analyysiin</button>
      <div style="margin-top:10px">
        <a href="https://claude.ai" target="_blank" class="muted" style="font-size:.8rem">Avaa claude.ai →</a>
      </div>
    </div>

    <!-- Luvut -->
    <div class="card">
      <div class="card-title">Yhteenveto</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="stat-box">
          <div class="stat-num">${total}</div>
          <div class="stat-lbl">HAVAINTOA</div>
        </div>
        <div class="stat-box" style="background:rgba(79,207,122,.1)">
          <div class="stat-num" style="color:var(--success)">${meniH.length}</div>
          <div class="stat-lbl">MENI</div>
        </div>
        <div class="stat-box" style="background:rgba(247,87,87,.1)">
          <div class="stat-num" style="color:var(--danger)">${poisH.length}</div>
          <div class="stat-lbl">EI MENNYT</div>
        </div>
      </div>
    </div>

    <!-- Tekstianalyysi -->
    <div class="card">
      <div class="card-title">🔍 Merkin tunnistus</div>
      ${teksti.length < 1 ? `
        <p class="muted" style="font-size:.9rem">Lisää enemmän havaintoja molemmista ryhmistä (meni + ei mennyt) jotta analyysi toimii.</p>
      ` : `
        <p class="muted" style="font-size:.83rem;margin-bottom:12px;line-height:1.5">
          Ohjelma on laskenut mitkä sanat ja ilmaisut esiintyvät useammin <strong style="color:var(--success)">meni</strong>-tilanteissa
          kuin <strong style="color:var(--danger)">ei mennyt</strong> -tilanteissa.
          Mitä kauempana 50% on, sitä enemmän termi erottaa nämä tilanteet toisistaan.
        </p>
        <table>
          <tr>
            <th>Termi</th>
            <th>Meni%</th>
            <th>Esiintymiä</th>
            <th></th>
          </tr>
          ${teksti.slice(0,30).map(t => `<tr>
            <td style="font-weight:600">${esc(t.termi)}</td>
            <td style="color:${t.mp>=60?'var(--success)':t.mp<=40?'var(--danger)':'var(--text)'};font-weight:700">${t.mp}%</td>
            <td class="muted">${t.n}</td>
            <td>
              <div class="bar-wrap">
                <div class="bar" style="width:${t.mp}%;background:${t.mp>=50?'var(--success)':'var(--danger)'}"></div>
              </div>
            </td>
          </tr>`).join('')}
        </table>
        <p class="muted" style="font-size:.78rem;margin-top:10px">
          Vihreä = esiintyy enemmän meni-tilanteissa · Punainen = esiintyy enemmän ei mennyt -tilanteissa
        </p>
      `}
    </div>
  `;
}

function tekstianalyysi(hvt) {
  const stop = new Set(['on','ei','ja','se','että','kun','oli','tai','ole','hän','ne','tämä','tuo',
    'siinä','kaikki','joka','mitä','vaan','myös','siis','mutta','niin','olla','olen','siitä','on']);
  const meniH = hvt.filter(h => MENI_TULOKSET.has(h.tulos) && h.kuvaus);
  const poisH = hvt.filter(h => h.tulos === 'pois' && h.kuvaus);
  if (meniH.length < 2 || poisH.length < 2) return [];
  function sanat(t) {
    const ws = (t||'').toLowerCase().replace(/[,.:;!?()\[\]]/g,' ').split(/\s+/)
      .filter(w => w.length >= 3 && !stop.has(w));
    const r = [...ws];
    for (let i=0; i<ws.length-1; i++) r.push(ws[i]+' '+ws[i+1]);
    return r;
  }
  const mc={}, pc={};
  meniH.forEach(h => sanat(h.kuvaus).forEach(w => { mc[w]=(mc[w]||0)+1; }));
  poisH.forEach(h => sanat(h.kuvaus).forEach(w => { pc[w]=(pc[w]||0)+1; }));
  const res = [];
  new Set([...Object.keys(mc),...Object.keys(pc)]).forEach(w => {
    const mn=mc[w]||0, pn=pc[w]||0, n=mn+pn;
    if (n < 2) return;
    res.push({termi:w, mp:Math.round(mn/n*100), n});
  });
  return res.sort((a,b) => Math.abs(b.mp-50)-Math.abs(a.mp-50)).slice(0,40);
}

// ══════════════════════════════════════════════════════════════════
// APUFUNKTIOT
// ══════════════════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tanaanPvm(){const d=new Date();return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear();}
function flash(id,teksti,virhe){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=`<div class="flash ${virhe?'flash-err':'flash-ok'}">${esc(teksti)}</div>`;
  if(!virhe)setTimeout(()=>{el.innerHTML='';},2500);
}
</script>
